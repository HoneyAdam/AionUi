name: 🐛 Bug Report
description: Report a bug or unexpected behavior in AionUi
title: '[Bug]: '
labels: ['bug']
body:
  - type: dropdown
    id: module
    attributes:
      label: 问题模块 / Module
      description: 这个问题属于哪个功能模块？/ Which module does this issue belong to?
      options:
        - Agent 检测与连接 / Agent Detection & Connection
        - 助手与预设 / Assistants & Presets
        - 模型与认证 / Models & Authentication
        - MCP 与工具 / MCP & Tools
        - Skills 与插件 / Skills & Plugins
        - 渠道接入 / Channel Integrations
        - 对话与会话 / Conversation & Sessions
        - 搜索与历史 / Search & History
        - 项目、文件与预览 / Project, Files & Preview
        - WebUI 与远程连接 / WebUI & Remote Access
        - 定时任务 / Scheduled Tasks
        - 团队协作 / Team Collaboration
        - 界面显示与桌面宠物 / Interface, Display & Desktop Pet
        - 系统设置 / System Settings
        - 其他 / Other
    validations:
      required: true

  - type: dropdown
    id: platform
    attributes:
      label: Platform
      description: Which platform are you using?
      options:
        - macOS (Apple Silicon)
        - macOS (Intel)
        - Windows
        - Linux
    validations:
      required: true

  - type: input
    id: version
    attributes:
      label: AionUi Version
      description: What version of AionUi are you using?
      placeholder: e.g., 1.2.2
    validations:
      required: true

  - type: textarea
    id: bug_description
    attributes:
      label: Bug Description
      description: A clear and concise description of what the bug is.
      placeholder: Describe what happened...
    validations:
      required: true

  - type: textarea
    id: steps_to_reproduce
    attributes:
      label: Steps to Reproduce
      description: Steps to reproduce the behavior
      placeholder: |
        1. Go to '...'
        2. Click on '...'
        3. See error
    validations:
      required: true

  - type: textarea
    id: expected_behavior
    attributes:
      label: Expected Behavior
      description: What should have happened?
      placeholder: What should have happened?
    validations:
      required: true

  - type: textarea
    id: actual_behavior
    attributes:
      label: Actual Behavior
      description: What actually happened?
      placeholder: What actually happened?
    validations:
      required: true

  - type: textarea
    id: additional_context
    attributes:
      label: Additional Context
      description: Add any other context about the problem here.
      placeholder: Screenshots, error logs, etc.
